<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Echo Weather">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001845"/>
      <stop offset="100%" stop-color="#00225c"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7fffff" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="cloudTop" x1="120" y1="150" x2="400" y2="300">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#c5e4ff"/>
      <stop offset="100%" stop-color="#5aa8f0"/>
    </linearGradient>
    <linearGradient id="cloudSide" x1="300" y1="160" x2="420" y2="280">
      <stop offset="0%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#3c91e6"/>
    </linearGradient>
    <radialGradient id="radarGlow" cx="50%" cy="58%" r="50%">
      <stop offset="0%" stop-color="#7fffff" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#3c91e6" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#3c91e6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#sky)"/>

  <ellipse cx="256" cy="295" rx="220" ry="185" fill="url(#radarGlow)"/>
  <g transform="translate(256 308)">
    <g>
      <circle r="188" fill="none" stroke="#001845" stroke-width="7" opacity="0.7"/>
      <circle r="188" fill="none" stroke="#7fffff" stroke-width="3.5"/>
      <circle r="142" fill="none" stroke="#001845" stroke-width="6.5" opacity="0.65"/>
      <circle r="142" fill="none" stroke="#8ec8ff" stroke-width="3.2"/>
      <circle r="96" fill="none" stroke="#001845" stroke-width="6" opacity="0.62"/>
      <circle r="96" fill="none" stroke="#7fffff" stroke-width="3"/>
      <circle r="52" fill="none" stroke="#001845" stroke-width="5.5" opacity="0.6"/>
      <circle r="52" fill="none" stroke="#8ec8ff" stroke-width="2.8"/>
    </g>
    <circle r="14" fill="#001845" stroke="#7fffff" stroke-width="3"/>
    <line x1="-198" y1="0" x2="198" y2="0" stroke="#001845" stroke-width="4" opacity="0.6"/>
    <line x1="-198" y1="0" x2="198" y2="0" stroke="#8ec8ff" stroke-width="2"/>
    <line x1="0" y1="-198" x2="0" y2="198" stroke="#001845" stroke-width="4" opacity="0.6"/>
    <line x1="0" y1="-198" x2="0" y2="198" stroke="#8ec8ff" stroke-width="2"/>
    <line x1="-140" y1="-140" x2="140" y2="140" stroke="#001845" stroke-width="3" opacity="0.5"/>
    <line x1="-140" y1="-140" x2="140" y2="140" stroke="#7fffff" stroke-width="1.5" opacity="0.9"/>
    <line x1="140" y1="-140" x2="-140" y2="140" stroke="#001845" stroke-width="3" opacity="0.5"/>
    <line x1="140" y1="-140" x2="-140" y2="140" stroke="#7fffff" stroke-width="1.5" opacity="0.9"/>
    <path d="M0 0 L0 -188 A188 188 0 0 1 133 -133 Z" fill="url(#beam)"/>
    <line x1="0" y1="0" x2="118" y2="-162" stroke="#001845" stroke-width="9" stroke-linecap="round" opacity="0.6"/>
    <line x1="0" y1="0" x2="118" y2="-162" stroke="#7fffff" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="52" cy="-108" r="9" fill="#7fffff"/>
    <circle cx="88" cy="-62" r="6" fill="#8ec8ff"/>
    <circle cx="-36" cy="-132" r="7" fill="#3c91e6"/>
    <circle cx="112" cy="-34" r="5" fill="#7fffff" opacity="0.95"/>
    <circle cx="18" cy="-72" r="4" fill="#ffffff" opacity="0.85"/>
  </g>

  <g opacity="0.84">
    <ellipse class="cloud-trace" cx="188" cy="218" rx="78" ry="50" fill="url(#cloudSide)" stroke="rgba(255,255,255,0.14)" stroke-width="1.4" paint-order="stroke fill"/>
    <ellipse class="cloud-trace" cx="268" cy="198" rx="96" ry="58" fill="url(#cloudTop)" stroke="rgba(255,255,255,0.14)" stroke-width="1.4" paint-order="stroke fill"/>
    <ellipse class="cloud-trace" cx="348" cy="226" rx="70" ry="44" fill="#dceeff" stroke="rgba(255,255,255,0.14)" stroke-width="1.4" paint-order="stroke fill"/>
    <ellipse class="cloud-trace" cx="248" cy="238" rx="108" ry="54" fill="#ffffff" stroke="rgba(255,255,255,0.14)" stroke-width="1.4" paint-order="stroke fill"/>
    <ellipse class="cloud-trace" cx="210" cy="208" rx="52" ry="36" fill="#ffffff" opacity="0.9" stroke="rgba(255,255,255,0.12)" stroke-width="1.2" paint-order="stroke fill"/>
    <ellipse cx="300" cy="252" rx="118" ry="28" fill="#3c91e6" opacity="0.14"/>
  </g>
</svg>
