<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Echo Weather">
  <defs>
    <linearGradient id="sky" x1="256" y1="64" x2="256" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#003875"/>
      <stop offset="100%" stop-color="#001845"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7fffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cloudFill" x1="256" y1="128" x2="256" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#6eb8f5"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#sky)"/>

  <g transform="translate(256 256) scale(0.78)">
    <circle cx="0" cy="72" r="148" fill="#3c91e6" opacity="0.18"/>

    <g transform="translate(0 82)" fill="none" stroke-linecap="round">
      <circle r="124" stroke="#7fffff" stroke-width="7" opacity="0.4"/>
      <circle r="82" stroke="#8ec8ff" stroke-width="6" opacity="0.65"/>
      <circle r="40" stroke="#7fffff" stroke-width="5" opacity="0.85"/>
      <path d="M0 0 L0 -124 A124 124 0 0 1 88 -88 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="78" y2="-106" stroke="#7fffff" stroke-width="10" stroke-linecap="round"/>
      <circle r="12" fill="#7fffff"/>
      <circle cx="44" cy="-72" r="11" fill="#ffffff"/>
      <circle cx="76" cy="-42" r="8" fill="#8ec8ff"/>
    </g>

    <ellipse cx="0" cy="-78" rx="102" ry="56" fill="url(#cloudFill)"/>
    <ellipse cx="-60" cy="-58" rx="64" ry="46" fill="#eaf4ff"/>
    <ellipse cx="64" cy="-62" rx="68" ry="48" fill="#dceeff"/>
    <ellipse cx="0" cy="-42" rx="118" ry="36" fill="#ffffff" opacity="0.9"/>
