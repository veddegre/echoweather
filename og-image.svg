    <circle cx="361.189" cy="234.895" r="119.098" fill="#FFC04A"/>
    <path fill="#5aa8f0" d="M452.744,341.694c0-42.633-28.497-81.461-69.299-94.422l-14.597-4.638l-0.738-15.299c-3.362-69.779-60.762-124.441-130.677-124.441c-62.36,0-116.348,44.388-128.376,105.548l-2.959,15.058l-15.15,2.442C39.098,234.297,0,280.168,0,332.639c0,59.591,48.483,108.073,108.073,108.073h245.652C408.324,440.713,452.744,396.292,452.744,341.694z"/>
