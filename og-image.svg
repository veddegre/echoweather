<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Echo Weather">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#001845"/>
      <stop offset="55%" stop-color="#00225c"/>
      <stop offset="100%" stop-color="#0a3568"/>
    </linearGradient>
    <radialGradient id="originGlow" cx="0" cy="1" r="0.8">
      <stop offset="0%" stop-color="#7fffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3c91e6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3c91e6"/>
      <stop offset="50%" stop-color="#7fffff"/>
      <stop offset="100%" stop-color="#3c91e6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative echo ripples -->
  <g opacity="0.1" stroke="#7fffff" fill="none" stroke-linecap="round" transform="translate(980 630)">
    <path d="M 0 -180 A 180 180 0 0 1 180 0" stroke-width="3"/>
    <path d="M 0 -300 A 300 300 0 0 1 300 0" stroke-width="2.5"/>
    <path d="M 0 -420 A 420 420 0 0 1 420 0" stroke-width="2"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(120 630)" fill="none" stroke-linecap="round">
    <rect x="0" y="-360" width="360" height="360" fill="url(#originGlow)" opacity="0.5"/>
    <path d="M 0 -208 A 160 160 0 0 1 160 0" stroke="#7fffff" stroke-width="10" opacity="0.92"/>
    <path d="M 0 -304 A 256 256 0 0 1 256 0" stroke="#8ec8ff" stroke-width="8" opacity="0.72"/>
    <path d="M 0 -412 A 364 364 0 0 1 364 0" stroke="#3c91e6" stroke-width="6.5" opacity="0.55"/>
    <path d="M 0 -508 A 460 460 0 0 1 460 0" stroke="#7fffff" stroke-width="5" opacity="0.32"/>
    <circle cx="198" cy="-246" r="12" fill="#ffffff" stroke="none"/>
    <circle cx="302" cy="-350" r="7.5" fill="#7fffff" stroke="none" opacity="0.85"/>
    <circle cx="118" cy="-166" r="5" fill="#8ec8ff" stroke="none" opacity="0.9"/>
  </g>

  <!-- text -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="430" y="250" fill="#ffffff" font-size="108" font-weight="700" letter-spacing="-2">Echo</text>
    <text x="432" y="310" fill="#7ec8ff" font-size="34" font-weight="600" letter-spacing="12">WEATHER</text>
    <text x="432" y="390" fill="#b8d4f0" font-size="36" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">Forecasts, radar &amp; atmosphere</text>
    <text x="432" y="438" fill="#8aa8c8" font-size="28" font-family="'Segoe UI', system-ui, sans-serif">Built for weather enthusiasts</text>
    <text x="432" y="510" fill="#3c91e6" font-size="30" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600">echoweather.com</text>
  </g>

  <rect x="430" y="540" width="520" height="5" rx="2.5" fill="url(#accentBar)" opacity="0.9"/>
</svg>
